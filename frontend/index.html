<!doctype html>
<html>
  <head>
    <title>Semantic News Search</title>

    <link rel="stylesheet" href="/static/style.css" />
  </head>

  <body>
    <div class="container">
      <h1>Semantic News Search</h1>

      <div class="search-box">
        <input
          id="queryInput"
          placeholder="Ask anything about news topics..."
        />

        <button onclick="search()">Search</button>
      </div>

      <div class="buttons">
        <button onclick="getStats()">Cache Stats</button>

        <button onclick="clearCache()">Clear Cache</button>
      </div>

      <div id="results"></div>
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
